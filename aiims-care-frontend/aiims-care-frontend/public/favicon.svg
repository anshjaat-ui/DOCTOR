<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb8c00"/>
      <stop offset="100%" stop-color="#ef6c00"/>
    </linearGradient>
  </defs>

  <!-- Outer Circle -->
  <circle cx="32" cy="32" r="30" fill="#ffffff"/>

  <!-- Medical Cross -->
  <g transform="translate(32 28)">
    <rect x="-6" y="-14" width="12" height="28" rx="3" fill="url(#blue)"/>
    <rect x="-14" y="-6" width="28" height="12" rx="3" fill="url(#orange)"/>
  </g>

  <!-- Leaf Person -->
  <circle cx="32" cy="22" r="3" fill="#1e88e5"/>
  <path d="M32 18 C28 22, 36 22, 32 18" fill="#1e88e5"/>

  <!-- Text A -->
  <text x="32" y="48" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">
    A
  </text>
</svg>
